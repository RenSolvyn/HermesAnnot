name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  state-audit:
    name: State Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run state audit
        run: python audit_state_resets.py sfrp_audit_v5.html
